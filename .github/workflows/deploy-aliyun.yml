name: Deploy To Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          set -euo pipefail
          GOOS=linux GOARCH=amd64 go build -o wechat-sync .

      - name: Validate SSH Key
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          ALIYUN_SSH_KEY_B64: ${{ secrets.ALIYUN_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          HOST="${ALIYUN_HOST:-112.124.103.65}"
          USER="${ALIYUN_USER:-root}"

          mkdir -p ~/.ssh

          if [ -n "${ALIYUN_SSH_KEY:-}" ]; then
            KEY_HEAD="$(printf '%s' "${ALIYUN_SSH_KEY}" | head -n 1)"
            if printf '%s' "${KEY_HEAD}" | grep -qE '^ssh-(ed25519|rsa|dss) '; then
              echo "::error::ALIYUN_SSH_KEY looks like a public key. Please set private key content."
              exit 1
            fi

            RAW_KEY="$(printf '%b' "${ALIYUN_SSH_KEY}" | tr -d '\r')"
            if printf '%s' "${RAW_KEY}" | grep -q -- '-----BEGIN OPENSSH PRIVATE KEY-----'; then
              printf '%s\n' "${RAW_KEY}" | awk '
                /-----BEGIN OPENSSH PRIVATE KEY-----/ {in_key=1}
                in_key {print}
                /-----END OPENSSH PRIVATE KEY-----/ {if (in_key) {exit}}
              ' > ~/.ssh/id_aliyun
            else
              printf '%s' "${RAW_KEY}" > ~/.ssh/id_aliyun
            fi
          elif [ -n "${ALIYUN_SSH_KEY_B64:-}" ]; then
            printf '%s' "${ALIYUN_SSH_KEY_B64}" | tr -d '\r\n ' | base64 -d > ~/.ssh/id_aliyun
          else
            echo "::error::Missing Actions secret: ALIYUN_SSH_KEY or ALIYUN_SSH_KEY_B64"
            exit 1
          fi

          chmod 600 ~/.ssh/id_aliyun

          if ! ssh-keygen -y -f ~/.ssh/id_aliyun >/dev/null 2>/tmp/ssh_key_err.log; then
            echo "::error::Invalid private key content in Actions secret."
            cat /tmp/ssh_key_err.log || true
            exit 1
          fi

          if ! ssh \
            -i ~/.ssh/id_aliyun \
            -o BatchMode=yes \
            -o ConnectTimeout=10 \
            -o StrictHostKeyChecking=accept-new \
            "${USER}@${HOST}" \
            "echo SSH_OK" >/tmp/ssh_probe_out.log 2>/tmp/ssh_probe_err.log; then
            if grep -qi "Permission denied" /tmp/ssh_probe_err.log; then
              echo "::error::SSH authentication failed. Ensure public key is in ~/.ssh/authorized_keys."
            elif grep -Eqi "Connection timed out|No route to host|Connection refused" /tmp/ssh_probe_err.log; then
              echo "::error::Cannot reach server SSH/22 from GitHub Actions. Check Aliyun security group/firewall."
            else
              echo "::error::SSH probe failed."
            fi
            cat /tmp/ssh_probe_err.log || true
            exit 1
          fi

          grep -q "SSH_OK" /tmp/ssh_probe_out.log

      - name: Upload Binary To Server
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
        run: |
          set -euo pipefail
          HOST="${ALIYUN_HOST:-112.124.103.65}"
          USER="${ALIYUN_USER:-root}"

          scp \
            -i ~/.ssh/id_aliyun \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=accept-new \
            wechat-sync \
            "${USER}@${HOST}:/tmp/wechat-sync"

      - name: Deploy On Server
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER: ${{ secrets.ALIYUN_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
          APP_ENV_B64: ${{ secrets.APP_ENV_B64 }}
        run: |
          set -euo pipefail
          HOST="${ALIYUN_HOST:-112.124.103.65}"
          USER="${ALIYUN_USER:-root}"

          cat > /tmp/remote_deploy.sh <<'REMOTE_SCRIPT'
            set -euo pipefail

            APP_ROOT="${APP_DIR:-/opt/fbif-wechat-article-dashboard}"
            BIN_DIR="${APP_ROOT}/bin"
            BINARY="${BIN_DIR}/wechat-sync"
            SERVICE_NAME="wechat-sync"

            mkdir -p "${BIN_DIR}"

            # Stop existing service (PM2 or systemd)
            pm2 delete wechat-dashboard >/dev/null 2>&1 || true
            systemctl stop "${SERVICE_NAME}" 2>/dev/null || true

            # Install new binary
            cp /tmp/wechat-sync "${BINARY}"
            chmod +x "${BINARY}"

            # Copy .env if exists
            SOURCE_ENV=""
            if [ -f "${APP_ROOT}/current/.env" ]; then
              SOURCE_ENV="${APP_ROOT}/current/.env"
            elif [ -f "${APP_ROOT}/.env" ]; then
              SOURCE_ENV="${APP_ROOT}/.env"
            fi

            if [ -n "${SOURCE_ENV}" ]; then
              cp "${SOURCE_ENV}" "${BIN_DIR}/.env"
            elif [ -n "${APP_ENV_B64:-}" ]; then
              printf '%s' "${APP_ENV_B64}" | tr -d '\r\n ' | base64 -d > "${BIN_DIR}/.env"
            fi

            # Create systemd service
            cat > /etc/systemd/system/${SERVICE_NAME}.service <<EOF
[Unit]
Description=WeChat Article Sync Service
After=network.target

[Service]
Type=simple
ExecStart=${BINARY}
WorkingDirectory=${BIN_DIR}
Restart=on-failure
RestartSec=10
StandardOutput=journal
StandardError=journal
SyslogIdentifier=${SERVICE_NAME}

[Install]
WantedBy=multi-user.target
EOF

            systemctl daemon-reload
            systemctl enable "${SERVICE_NAME}"
            systemctl start "${SERVICE_NAME}"

            sleep 3
            curl -fsS "http://127.0.0.1:3002/health" >/dev/null

            echo "Deploy complete: $(${BINARY} --version 2>/dev/null || echo 'binary installed')"
          REMOTE_SCRIPT

          REMOTE_ENV="$(printf \
            "APP_DIR=%q APP_ENV_B64=%q" \
            "${APP_DIR:-}" "${APP_ENV_B64:-}")"

          ssh \
            -i ~/.ssh/id_aliyun \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=accept-new \
            "${USER}@${HOST}" \
            "${REMOTE_ENV} bash -s" < /tmp/remote_deploy.sh

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_aliyun /tmp/remote_deploy.sh wechat-sync
